version: "3.9"

# ── SECURITY: never commit .env to git ───────────────────────────────────────
# Copy .env.example to .env and fill in your values before running.
# All secrets are loaded from .env — not hardcoded here.
# ─────────────────────────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./bench_library:/bench_library
      - backend_data:/app/data
    env_file:
      - .env          # Load all secrets from .env (not committed to git)
    environment:
      - DATABASE_URL=sqlite:///./data/eval_platform.db
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - BENCH_LIBRARY_PATH=/bench_library
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEBUG=${DEBUG:-false}
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A core.job_queue:celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./bench_library:/bench_library
      - backend_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/eval_platform.db
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - BENCH_LIBRARY_PATH=/bench_library
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEBUG=${DEBUG:-false}
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
      - worker
    restart: unless-stopped

volumes:
  backend_data:
